name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Run linter
        run: npm run lint

      - name: Run formatter check
        run: npm run format:check

      - name: Run TypeScript type check
        run: npm run type-check

      - name: Check GM API grants
        run: npm run check-grants

      - name: Run tests
        run: npm run test

      - name: Build userscript
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: userscript
          path: dist/userscript.user.js

  userscript-mode:
    name: Validate (userscript mode)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run formatter check
        run: npm run format:check

      - name: Run TypeScript type check
        run: npm run type-check

      - name: Run tests
        run: npm run test

      - name: Simulate post-setup state
        run: |
          node --input-type=commonjs -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.userscript.templateMode = false;
            delete pkg.scripts.setup;
            delete pkg.scripts['check-grants'];
            if (pkg.scripts.validate) {
              pkg.scripts.validate = pkg.scripts.validate
                .replace(/\s*&&\s*npm run check-grants/, '')
                .replace(/npm run check-grants\s*&&\s*/, '');
            }
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          rm -f scripts/setup.js scripts/README.template.md

      - name: Build userscript
        run: npm run build

      - name: Verify build output
        run: test -f dist/userscript.user.js

  markdown-links:
    runs-on: ubuntu-latest
    continue-on-error: true  # Don't fail the workflow if links break

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check markdown links
        run: npm run check-links

  version-check:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.base_ref == 'main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version is not lower than main
        run: |
          CHANGED=$(git diff origin/main...HEAD -- package.json | grep '"version"' | wc -l)
          if [ "$CHANGED" -eq 0 ]; then
            echo "ℹ️ Version unchanged in this PR, nothing to check"
            exit 0
          fi

          PR_VER=$(node -p "require('./package.json').version")
          MAIN_VER=$(git show origin/main:package.json | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).version")

          echo "main: $MAIN_VER"
          echo "PR:   $PR_VER"

          if [ "$(printf '%s\n' "$PR_VER" "$MAIN_VER" | sort -V | head -n1)" = "$PR_VER" ] && [ "$PR_VER" != "$MAIN_VER" ]; then
            echo "❌ Version regression: PR version ($PR_VER) is lower than main ($MAIN_VER)"
            echo "   Do not manually edit the version. Use the Version Bump workflow instead."
            exit 1
          fi

          echo "✅ Version OK (equal or higher than main)"
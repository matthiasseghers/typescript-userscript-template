name: Version Bump

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: 'patch'

permissions:
  contents: write

jobs:
  bump-version:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Detect mode and validate
        id: mode
        run: |
          TEMPLATE_REPO="matthiasseghers/typescript-userscript-template"
          CURRENT_REPO="${{ github.repository }}"
          PACKAGE_REPO_URL=$(node -p "require('./package.json').repository?.url ?? ''")
          TEMPLATE_MODE=$(node -p "require('./package.json').userscript?.templateMode ?? false")

          echo "Current repo:    $CURRENT_REPO"
          echo "Package repo:    $PACKAGE_REPO_URL"
          echo "Template mode:   $TEMPLATE_MODE"

          if [[ "$PACKAGE_REPO_URL" == *"$TEMPLATE_REPO"* ]] && [[ "$CURRENT_REPO" != "$TEMPLATE_REPO" ]]; then
            echo ""
            echo "❌ ERROR: You forgot to update repository.url in package.json!"
            echo "   It still points to the template repo: $PACKAGE_REPO_URL"
            echo "   Update it to point to YOUR repository before releasing."
            exit 1
          fi

          if [ "$TEMPLATE_MODE" = "true" ]; then
            echo "📦 Running in TEMPLATE MODE (templateMode: true in package.json)"
            echo "   Only package.json will be bumped. meta.json is left untouched."
            echo "template_mode=true" >> $GITHUB_OUTPUT
          else
            echo "📜 Running in USERSCRIPT MODE"
            echo "   Only meta.json will be bumped. package.json is left untouched."
            echo "template_mode=false" >> $GITHUB_OUTPUT
          fi

      - name: Validate version integrity
        env:
          TEMPLATE_MODE: ${{ steps.mode.outputs.template_mode }}
        run: |
          if [ "$TEMPLATE_MODE" = "true" ]; then
            CURRENT_VER=$(node -p "require('./package.json').version")
            VERSION_SOURCE="package.json"
          else
            CURRENT_VER=$(node -p "require('./meta.json').version")
            VERSION_SOURCE="meta.json"
          fi

          LATEST_TAG=$(git tag --sort=-version:refname | grep '^v' | head -1)

          if [ -z "$LATEST_TAG" ]; then
            echo "ℹ️ No existing tags found, skipping integrity check"
            exit 0
          fi

          LATEST_VER="${LATEST_TAG#v}"

          echo "$VERSION_SOURCE: $CURRENT_VER"
          echo "latest tag:   $LATEST_TAG"

          if [ "$(printf '%s\n' "$CURRENT_VER" "$LATEST_VER" | sort -V | head -n1)" = "$CURRENT_VER" ] && [ "$CURRENT_VER" != "$LATEST_VER" ]; then
            echo "❌ $VERSION_SOURCE version ($CURRENT_VER) is behind latest tag ($LATEST_TAG)"
            echo "   The version was likely manually edited. Fix $VERSION_SOURCE before bumping."
            exit 1
          fi

          echo "✅ $VERSION_SOURCE ($CURRENT_VER) is in sync with latest tag ($LATEST_TAG)"

      - name: Bump version
        id: version
        env:
          BUMP_TYPE: ${{ github.event.inputs.version }}
          TEMPLATE_MODE: ${{ steps.mode.outputs.template_mode }}
        run: |
          if [ "$TEMPLATE_MODE" = "true" ]; then
            # Template mode: bump package.json only
            NEW_VERSION=$(npm version "$BUMP_TYPE" --no-git-tag-version)
            echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
            echo "Bumped package.json to $NEW_VERSION"
          else
            # Userscript mode: bump meta.json only
            CURRENT=$(node -p "require('./meta.json').version")
            NEW_VERSION=$(node -e "
              const v = '$CURRENT'.split('.').map(Number);
              if ('$BUMP_TYPE' === 'major') { v[0]++; v[1]=0; v[2]=0; }
              else if ('$BUMP_TYPE' === 'minor') { v[1]++; v[2]=0; }
              else { v[2]++; }
              console.log('v' + v.join('.'));
            ")
            VERSION_NUMBER="${NEW_VERSION#v}"
            node scripts/update-meta-version.js "$VERSION_NUMBER"
            echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
            echo "Bumped meta.json to $NEW_VERSION"
          fi

      - name: Commit and tag
        env:
          HUSKY: '0'
          NEW_VERSION: ${{ steps.version.outputs.new_version }}
          TEMPLATE_MODE: ${{ steps.mode.outputs.template_mode }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          if [ "$TEMPLATE_MODE" = "true" ]; then
            git add package.json package-lock.json
          else
            git add meta.json
          fi
          git commit -m "chore: bump version to $NEW_VERSION"
          git tag "$NEW_VERSION"
          git push origin "$DEFAULT_BRANCH"
          git push origin "$NEW_VERSION"

      - name: Summary
        run: |
          echo "### ✅ Version bumped successfully!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**New version:** \`${{ steps.version.outputs.new_version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Mode:** $([ '${{ steps.mode.outputs.template_mode }}' = 'true' ] && echo 'Template (package.json bumped)' || echo 'Userscript (meta.json bumped)')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The **Release** workflow will now run automatically." >> $GITHUB_STEP_SUMMARY